# =============================================================================
# Universal Grammar Specification for HotSpot Error Report (hs_err) Files
# =============================================================================
#
# This YAML file is the single source of truth for syntax highlighting of
# hs_err_pid*.log files produced by the HotSpot JVM on fatal errors.
#
# It can be used to manually derive:
#   - TextMate / VS Code / shiki grammars
#   - highlight.js language modules
#   - CodeMirror StreamParser grammars
#
# Scope names follow TextMate conventions so they map directly to VS Code
# colour themes (Dark+, Light+, Monokai, Solarized, etc.).
# =============================================================================

metadata:
  name: hserr
  displayName: "HotSpot Error Report"
  scopeName: source.hserr
  fileTypes:
    - "hs_err_pid*.log"
    - "hserr_example"
    - "*.hserr"
  firstLineMatch: "^#\\s*$"
  # The very first line of every hs_err file is a lone "#"

# ---------------------------------------------------------------------------
# Keyword lists — reusable sets referenced by patterns below
# ---------------------------------------------------------------------------
keywords:

  signals:
    # POSIX signals
    - SIGSEGV
    - SIGBUS
    - SIGFPE
    - SIGILL
    - SIGTRAP
    - SIGABRT
    - SIGTERM
    - SIGINT
    - SIGHUP
    - SIGQUIT
    - SIGPOLL
    - SIGKILL
    - SIGUSR1
    - SIGUSR2
    - SIGALRM
    - SIGCHLD
    - SIGCONT
    - SIGSTOP
    - SIGTSTP
    - SIGTTIN
    - SIGTTOU
    - SIGXCPU
    - SIGXFSZ
    - SIGPROF
    # Windows exceptions (NtStatus codes)
    - EXCEPTION_ACCESS_VIOLATION
    - EXCEPTION_STACK_OVERFLOW
    - EXCEPTION_IN_PAGE_ERROR
    - EXCEPTION_INVALID_HANDLE
    - EXCEPTION_ARRAY_BOUNDS_EXCEEDED
    - EXCEPTION_FLT_DENORMAL_OPERAND
    - EXCEPTION_FLT_DIVIDE_BY_ZERO
    - EXCEPTION_FLT_INEXACT_RESULT
    - EXCEPTION_FLT_INVALID_OPERATION
    - EXCEPTION_FLT_OVERFLOW
    - EXCEPTION_FLT_UNDERFLOW
    - EXCEPTION_INT_DIVIDE_BY_ZERO
    - EXCEPTION_INT_OVERFLOW
    - EXCEPTION_DATATYPE_MISALIGNMENT

  error_types:
    - Internal Error
    - Out of Memory
    - OutOfMemory
    - StackOverflow
    - Stack overflow
    - Segmentation fault
    - Bus error
    - Illegal instruction
    - Floating point exception
    - Trap
    - Abort
    - Access violation
    - GC overhead limit exceeded
    - Unable to create new native thread
    - OutOfMemoryError
    - Java heap space
    - Native memory allocation failed
    - Metadata space
    - Metaspace
    - Compressed class space

  thread_states:
    # Java thread states
    - _thread_in_vm
    - _thread_in_native
    - _thread_in_Java
    - _thread_blocked
    - _thread_new
    - _thread_uninitialized
    # Extended states
    - _thread_suspended
    - _thread_in_conc_gc
    - _thread_in_native_trans
    - _thread_in_vm_trans

  vm_states:
    - not at safepoint
    - at safepoint
    - synchronizing

  thread_types:
    # Primary VM threads
    - JavaThread
    - VMThread
    - CompilerThread
    - GCTaskThread
    - WatcherThread
    - ConcurrentGCThread
    - WorkerThread
    - CodeCacheSweeperThread
    - ServiceThread
    - NotificationThread
    - StringDedupThread
    # Additional thread types from modern HotSpot
    - ParallelCompileThread
    - PeriodicalTaskThread
    - JfrRecorderThread
    - AttachListenerThread
    - TrimThread
    - ZMarkStackExpandThread

  frame_type_codes:
    V: VM C++ code
    v: VM generated stub/blob
    C: native (JNI/agent)
    J: compiled Java
    j: interpreted Java
    A: other

  compilation_tiers:
    - c1
    - c2

  gc_types:
    - G1
    - Shenandoah
    - ZGC
    - Parallel
    - Serial

  flag_types:
    - bool
    - int
    - uint
    - intx
    - uintx
    - uint64_t
    - size_t
    - double
    - ccstr
    - ccstrlist

  x86_registers:
    # 64-bit general purpose
    - RAX
    - RBX
    - RCX
    - RDX
    - RSI
    - RDI
    - RBP
    - RSP
    - R8
