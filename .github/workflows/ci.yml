name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  schedule:
    - cron: '15 2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest ]
        java: [ 17, 21 ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn -B verify

      - name: Package assembly JAR
        run: mvn -B package -DskipTests

      - name: Upload assembled JAR
        uses: actions/upload-artifact@v4
        with:
          name: jhserr-${{ matrix.os }}-jdk${{ matrix.java }}
          path: target/jhserr.jar

      - name: Upload executable JAR
        if: matrix.os == 'ubuntu-latest' && matrix.java == 17
        uses: actions/upload-artifact@v4
        with:
          name: jhserr-exec
          path: target/jhserr-exec.jar

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-jdk${{ matrix.java }}
          path: target/surefire-reports/

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25-ea'
          distribution: 'graalvm'
          cache: 'maven'

      - name: Install binaryen
        run: |
          # Install newer binaryen from GitHub releases (apt version is too old for GC support)
          BINARYEN_VERSION="119"
          wget -q https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VERSION}/binaryen-version_${BINARYEN_VERSION}-x86_64-linux.tar.gz
          tar xzf binaryen-version_${BINARYEN_VERSION}-x86_64-linux.tar.gz
          sudo mv binaryen-version_${BINARYEN_VERSION}/bin/* /usr/local/bin/
          wasm-as --version

      - name: Install parser library
        run: mvn -B install -DskipTests

      - name: Build hserr-web (GraalVM Web Image)
        working-directory: hserr-web
        run: mvn -B package 2>&1 | tee mvn.out

      - name: Verify WASM output
        run: |
          ls -lh hserr-web/web/hserr.js hserr-web/web/hserr.js.wasm

      - name: Upload web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hserr-web
          path: hserr-web/web/
