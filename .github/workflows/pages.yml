name: Deploy Web Tool to GitHub Pages

on:
  push:
    branches: [ master, main ]
    paths:
      - 'src/main/java/me/bechberger/jhserr/**'
      - 'hserr-web/**'
      - 'pom.xml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM 25 EA
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25-ea'
          distribution: 'graalvm'
          cache: 'maven'

      - name: Install binaryen
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq binaryen

      - name: Install parser library to local repo
        run: mvn -B install -DskipTests 2>&1 | tee mvn.out

      - name: Build WASM with Web Image
        working-directory: hserr-web
        run: mvn -B package 2>&1 | tee mvn.out

      - name: Verify output
        working-directory: hserr-web/web
        run: |
          ls -lh hserr.js hserr.js.wasm index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: hserr-web/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
